<app-header></app-header>
@if (isLoading()) {
  <div class="container">
    <div class="spinner-grow text-center text-primary align-items-center justify-content-center">
    </div>
  </div>

} @else {
  <section class="h-100">
    <div class="container h-100 py-5">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-10">

          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-normal mb-0">Shopping Cart</h3>
            <div>
              <p class="mb-0"><span class="text-muted">Sort by:</span> <a href="#!" class="text-body">price <i
                class="fas fa-angle-down mt-1"></i></a></p>
            </div>
          </div>

          @for (cartProduct of cart()?.data ; track cartProduct.id) {
            <div class="card rounded-3 mb-4 cartProduct" [routerLink]="['/Product',cartProduct.product.product_id]">
              <div class="card-body p-4">
                <div class="row d-flex justify-content-between align-items-center">
                  <div class="col-md-2 col-lg-2 col-xl-2">
                    <img
                      [src]="cartProduct.product.product_images[0]"
                      class="img-fluid rounded-3" alt="Cotton T-shirt">
                  </div>
                  <div class="col-md-3 col-lg-3 col-xl-3">
                    <p class="lead fw-normal mb-2">{{ cartProduct.product.product_name }}</p>
                  </div>
                  <div class="col-md-3 col-lg-2 col-xl-2 offset-lg-1">
                    <h5 class="mb-0">{{cartProduct.product_price|currency}}</h5>
                  </div>
                  <div class="col-md-1 col-lg-1 col-xl-1 text-end">
                    <button class="btn text-danger border-0" (click)="$event.stopPropagation(); removeFromCart(cartProduct.product.product_id)">
                      <i class="fas fa-trash fa-lg"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          }
          <div class="card">
            <div class="card-body">
              <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block btn-lg">Proceed to Pay</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
}
<app-footer></app-footer>
